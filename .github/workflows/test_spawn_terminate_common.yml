# Common workflow to check support of any backend provider
name: test_spawn_terminate_common

on:
  workflow_call:
    inputs:
      backend:
        required: true
        type: string
      profile:
        required: true
        type: string
    secrets:
      SLAB_ACTION_TOKEN:
        required: true
      SLAB_BASE_URL_PRE_PROD:
        required: true
      JOB_SECRET:
        required: true

permissions:
  contents: read

jobs:
  action-start:
    name: test_spawn_terminate_common/action-start
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.gen-output.outputs.runner_label }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Test start instance
        id: test-start
        uses: ./
        with:
          mode: start
          github-token: ${{ secrets.SLAB_ACTION_TOKEN }}
          slab-url: ${{ secrets.SLAB_BASE_URL_PRE_PROD }}
          job-secret: ${{ secrets.JOB_SECRET }}
          backend: ${{ inputs.backend }}
          profile: ${{ inputs.profile }}

      - name: Generate output
        id: gen-output
        run: |
          echo "runner_label=${{ steps.test-start.outputs.label }}" >> "${GITHUB_OUTPUT}"

  test-runner-alive:
    name: test_spawn_terminate_common/Test runner is alive
    needs: [action-start]
    uses: ./.github/workflows/registered_runner.yml
    with:
      runner-name: ${{ needs.action-start.outputs.runner-label }}

  action-stop:
    name: test_spawn_terminate_common/action-stop
    runs-on: ubuntu-latest
    needs: [action-start, test-runner-alive ]
    if: ${{ always() && needs.action-start.result != 'skipped' }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Test stop instance
        id: test-stop
        uses: ./
        with:
          mode: stop
          github-token: ${{ secrets.SLAB_ACTION_TOKEN }}
          slab-url: ${{ secrets.SLAB_BASE_URL_PRE_PROD }}
          job-secret: ${{ secrets.JOB_SECRET }}
          label: ${{ needs.action-start.outputs.runner-label }}

  test-runner-removed:
    name: test_spawn_terminate_common/test-runner-removed
    needs: [action-start, action-stop]
    uses: ./.github/workflows/removed_runner.yml
    with:
      runner-name: ${{ needs.action-start.outputs.runner-label }}
      must-exist: false
    secrets:
      READ_REPO_TOKEN: ${{ secrets.SLAB_ACTION_TOKEN }}
